# CloudMount Org Build — GitHub Actions Template
#
# Multi-platform build workflow that clones the public CloudMount repo,
# injects your org's defaults.toml, and builds branded desktop binaries.
#
# SETUP:
#   1. Copy this file to .github/workflows/build.yml in your private config repo
#   2. Place your defaults.toml in the repo root
#   3. Configure repository settings:
#      Secrets (Settings > Secrets and variables > Actions > Secrets):
#        - CLOUDMOUNT_CLIENT_ID — Azure AD application client ID (masked)
#      Variables (Settings > Secrets and variables > Actions > Variables):
#        - CLOUDMOUNT_TENANT_ID — Azure AD tenant ID
#        - CLOUDMOUNT_APP_NAME  — Branded app name (e.g., "Contoso Drive")
#        - CLOUDMOUNT_VERSION   — (Optional) Override version tag
#
# Remove any platform from the matrix you don't need.

name: Build CloudMount

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDMOUNT_VERSION: ${{ vars.CLOUDMOUNT_VERSION || 'v0.1.0' }}
  CLOUDMOUNT_CLIENT_ID: ${{ secrets.CLOUDMOUNT_CLIENT_ID }}
  CLOUDMOUNT_TENANT_ID: ${{ vars.CLOUDMOUNT_TENANT_ID }}
  CLOUDMOUNT_APP_NAME: ${{ vars.CLOUDMOUNT_APP_NAME }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: cloudmount-linux
            artifact-path: cloudmount-src/target/release/cloudmount-app
          - os: macos-latest
            artifact-name: cloudmount-macos
            artifact-path: cloudmount-src/target/release/cloudmount-app
          - os: windows-latest
            artifact-name: cloudmount-windows
            artifact-path: cloudmount-src/target/release/cloudmount-app.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone CloudMount source
        run: git clone --depth 1 --branch ${{ env.CLOUDMOUNT_VERSION }} https://github.com/nyxa/cloudmount.git cloudmount-src

      - name: Inject org config
        shell: bash
        run: cp defaults.toml cloudmount-src/build/defaults.toml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cloudmount-src

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libfuse3-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: brew install macfuse

      - name: Build
        working-directory: cloudmount-src
        run: cargo build --release -p cloudmount-app --features desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
