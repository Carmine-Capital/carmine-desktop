# CloudMount Org Build — GitLab CI Template
#
# Multi-platform build pipeline that clones the public CloudMount repo,
# injects your org's defaults.toml, and builds branded desktop binaries.
#
# SETUP:
#   1. Copy this file to .gitlab-ci.yml in your private config repo
#   2. Place your defaults.toml in the repo root
#   3. Configure CI/CD variables (Settings > CI/CD > Variables):
#      - CLOUDMOUNT_CLIENT_ID  (Masked) — Azure AD application client ID
#      - CLOUDMOUNT_TENANT_ID           — Azure AD tenant ID
#      - CLOUDMOUNT_APP_NAME            — Branded app name (e.g., "Contoso Drive")
#      - CLOUDMOUNT_VERSION             — (Optional) Override version tag
#
# RUNNERS:
#   - Linux: uses Docker runner (available on all GitLab tiers)
#   - macOS: requires runner tagged 'saas-macos-medium-m1' (GitLab Premium+)
#   - Windows: requires runner tagged 'saas-windows-medium-amd64' (GitLab Premium+)
#
# Remove any platform job you don't need. Each job is independent.

variables:
  CLOUDMOUNT_VERSION: "v0.1.0"
  CLOUDMOUNT_REPO: "https://github.com/nyxa/cloudmount.git"

stages:
  - build

# ---------------------------------------------------------------------------
# Linux (Docker runner — always available)
# ---------------------------------------------------------------------------
build-linux:
  stage: build
  image: rust:latest
  variables:
    CLOUDMOUNT_CLIENT_ID: "$CLOUDMOUNT_CLIENT_ID"
    CLOUDMOUNT_TENANT_ID: "$CLOUDMOUNT_TENANT_ID"
    CLOUDMOUNT_APP_NAME: "$CLOUDMOUNT_APP_NAME"
  before_script:
    - apt-get update && apt-get install -y
        libfuse3-dev
        pkg-config
        libwebkit2gtk-4.1-dev
        libgtk-3-dev
        libayatana-appindicator3-dev
        librsvg2-dev
    - git clone --depth 1 --branch $CLOUDMOUNT_VERSION $CLOUDMOUNT_REPO cloudmount-src
    - cp defaults.toml cloudmount-src/build/defaults.toml
  script:
    - cd cloudmount-src
    - cargo build --release -p cloudmount-app --features desktop
  artifacts:
    paths:
      - cloudmount-src/target/release/cloudmount-app
    expire_in: 30 days

# ---------------------------------------------------------------------------
# macOS (shell runner — requires GitLab Premium+ or self-hosted runner)
# ---------------------------------------------------------------------------
build-macos:
  stage: build
  tags:
    - saas-macos-medium-m1
  variables:
    CLOUDMOUNT_CLIENT_ID: "$CLOUDMOUNT_CLIENT_ID"
    CLOUDMOUNT_TENANT_ID: "$CLOUDMOUNT_TENANT_ID"
    CLOUDMOUNT_APP_NAME: "$CLOUDMOUNT_APP_NAME"
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    - brew install macfuse
    - git clone --depth 1 --branch $CLOUDMOUNT_VERSION $CLOUDMOUNT_REPO cloudmount-src
    - cp defaults.toml cloudmount-src/build/defaults.toml
  script:
    - cd cloudmount-src
    - cargo build --release -p cloudmount-app --features desktop
  artifacts:
    paths:
      - cloudmount-src/target/release/cloudmount-app
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Windows (shell runner — requires GitLab Premium+ or self-hosted runner)
# ---------------------------------------------------------------------------
build-windows:
  stage: build
  tags:
    - saas-windows-medium-amd64
  variables:
    CLOUDMOUNT_CLIENT_ID: "$CLOUDMOUNT_CLIENT_ID"
    CLOUDMOUNT_TENANT_ID: "$CLOUDMOUNT_TENANT_ID"
    CLOUDMOUNT_APP_NAME: "$CLOUDMOUNT_APP_NAME"
  before_script:
    - Invoke-WebRequest -Uri https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe -OutFile rustup-init.exe
    - .\rustup-init.exe -y
    - $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
    - git clone --depth 1 --branch $CLOUDMOUNT_VERSION $CLOUDMOUNT_REPO cloudmount-src
    - Copy-Item defaults.toml cloudmount-src\build\defaults.toml
  script:
    - cd cloudmount-src
    - cargo build --release -p cloudmount-app --features desktop
  artifacts:
    paths:
      - cloudmount-src/target/release/cloudmount-app.exe
    expire_in: 30 days
