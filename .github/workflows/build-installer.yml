name: Build Installer

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name (e.g. "Contoso Drive")'
        required: false
        default: 'Carmine Desktop'
      tenant_id:
        description: 'Azure AD tenant ID'
        required: false
      client_id:
        description: 'Azure AD client ID'
        required: false
      mounts_json:
        description: 'Pre-configured mounts as JSON array'
        required: false
        default: '[]'

env:
  CARGO_TERM_COLOR: always
  # Pinned WinFsp version for bundling — update alongside winfsp crate dependency
  WINFSP_MSI_VERSION: "2.1.25156"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      # `cargo tauri build` invokes `beforeBuildCommand` (npm --prefix frontend
      # run build) from the app crate cwd below — node_modules must be present.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crates/carminedesktop-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/carminedesktop-app/frontend

      - name: Install WinFsp SDK and LLVM
        run: |
          choco install winfsp llvm -y --params '/Developer'
          echo "WINFSP_INSTALL_DIR=C:\Program Files (x86)\WinFsp" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Download WinFsp MSI for bundling
        run: |
          New-Item -ItemType Directory -Force -Path crates/carminedesktop-app/resources
          $url = "https://github.com/winfsp/winfsp/releases/download/v$($env:WINFSP_MSI_VERSION.Split('.')[0..1] -join '.')/winfsp-$env:WINFSP_MSI_VERSION.msi"
          Write-Host "Downloading WinFsp MSI from $url"
          Invoke-WebRequest -Uri $url -OutFile crates/carminedesktop-app/resources/winfsp.msi
        shell: pwsh

      - name: Generate build/defaults.toml
        shell: bash
        run: |
          cat > build/defaults.toml << 'TOML'
          [tenant]
          id = "${{ inputs.tenant_id }}"
          client_id = "${{ inputs.client_id }}"

          [branding]
          app_name = "${{ inputs.app_name }}"

          [defaults]
          auto_start = true
          TOML

          if [ '${{ inputs.mounts_json }}' != '[]' ]; then
            echo '${{ inputs.mounts_json }}' | python3 -c "
          import json, sys
          mounts = json.load(sys.stdin)
          for m in mounts:
              print()
              print('[[mounts]]')
              for k, v in m.items():
                  if isinstance(v, bool):
                      print(f'{k} = {str(v).lower()}')
                  else:
                      print(f'{k} = \"{v}\"')
          " >> build/defaults.toml
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build installer
        run: cargo tauri build --features desktop
        working-directory: crates/carminedesktop-app

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installer-windows
          path: |
            target/release/bundle/nsis/*.exe
