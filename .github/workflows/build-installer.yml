name: Build Installer

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name (e.g. "Contoso Drive")'
        required: false
        default: 'CloudMount'
      tenant_id:
        description: 'Azure AD tenant ID'
        required: false
      client_id:
        description: 'Azure AD client ID'
        required: false
      mounts_json:
        description: 'Pre-configured mounts as JSON array'
        required: false
        default: '[]'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: brew install macfuse

      - name: Install WinFsp SDK and LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install winfsp llvm -y --params '/Developer'
          echo "WINFSP_INSTALL_DIR=C:\Program Files (x86)\WinFsp" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Generate build/defaults.toml
        shell: bash
        run: |
          cat > build/defaults.toml << 'TOML'
          [tenant]
          id = "${{ inputs.tenant_id }}"
          client_id = "${{ inputs.client_id }}"

          [branding]
          app_name = "${{ inputs.app_name }}"

          [defaults]
          auto_start = true
          TOML

          if [ '${{ inputs.mounts_json }}' != '[]' ]; then
            echo '${{ inputs.mounts_json }}' | python3 -c "
          import json, sys
          mounts = json.load(sys.stdin)
          for m in mounts:
              print()
              print('[[mounts]]')
              for k, v in m.items():
                  if isinstance(v, bool):
                      print(f'{k} = {str(v).lower()}')
                  else:
                      print(f'{k} = \"{v}\"')
          " >> build/defaults.toml
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build installer
        run: cargo tauri build --features desktop
        working-directory: crates/cloudmount-app

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: target/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
