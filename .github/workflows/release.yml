name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  # Pinned WinFsp version for bundling — update alongside winfsp crate dependency
  WINFSP_MSI_VERSION: "2.1.25156"
  UPLOAD_HOST: "static.carminecapital.com"
  UPLOAD_PATH: "/var/www/users/carminec/carmine-desktop"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches tauri.conf.json version
        id: extract
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CONF_VERSION=$(jq -r '.version' crates/carminedesktop-app/tauri.conf.json)
          echo "Tag version:  $TAG_VERSION"
          echo "Conf version: $CONF_VERSION"
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION, tauri.conf.json=$CONF_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # `cargo tauri build` invokes `beforeBuildCommand` (npm --prefix frontend
      # run build) from the app crate cwd below — node_modules must be present.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crates/carminedesktop-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/carminedesktop-app/frontend

      - name: Install WinFsp SDK and LLVM
        run: |
          choco install winfsp llvm -y --params '/Developer'
          echo "WINFSP_INSTALL_DIR=C:\Program Files (x86)\WinFsp" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Download WinFsp MSI for bundling
        run: |
          New-Item -ItemType Directory -Force -Path crates/carminedesktop-app/resources
          $url = "https://github.com/winfsp/winfsp/releases/download/v$($env:WINFSP_MSI_VERSION.Split('.')[0..1] -join '.')/winfsp-$env:WINFSP_MSI_VERSION.msi"
          Write-Host "Downloading WinFsp MSI from $url"
          Invoke-WebRequest -Uri $url -OutFile crates/carminedesktop-app/resources/winfsp.msi
        shell: pwsh

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build and sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --features desktop --target x86_64-pc-windows-msvc
        working-directory: crates/carminedesktop-app

      - name: Collect artifacts
        shell: bash
        run: |
          set +e  # don't exit on cp failures — we validate explicitly below
          mkdir -p artifacts
          BUNDLE="target/x86_64-pc-windows-msvc/release/bundle"

          echo "=== Bundle directory contents ==="
          find "$BUNDLE" -type f \( -name '*.zip' -o -name '*.sig' -o -name '*.exe' -o -name '*.msi' \) 2>/dev/null | sort || echo "(nothing found)"

          # Collect Windows bundles and signatures. Depending on updater mode,
          # updater artifact may be .nsis.zip or direct setup.exe.
          find "$BUNDLE/nsis" -maxdepth 1 -name '*-setup.exe'     -exec cp {} artifacts/ \;
          find "$BUNDLE/nsis" -maxdepth 1 -name '*-setup.exe.sig' -exec cp {} artifacts/ \;
          find "$BUNDLE/nsis" -maxdepth 1 -name '*.nsis.zip'      -exec cp {} artifacts/ \;
          find "$BUNDLE/nsis" -maxdepth 1 -name '*.nsis.zip.sig'  -exec cp {} artifacts/ \;

          # Validate an updater bundle + signature pair exists
          if ls artifacts/*.nsis.zip 1>/dev/null 2>&1; then
            if ! ls artifacts/*.nsis.zip.sig 1>/dev/null 2>&1; then
              echo "::error::Missing Windows updater signature (.nsis.zip.sig)"
              exit 1
            fi
          elif ls artifacts/*-setup.exe 1>/dev/null 2>&1; then
            if ! ls artifacts/*-setup.exe.sig 1>/dev/null 2>&1; then
              echo "::error::Missing Windows updater signature (-setup.exe.sig)"
              exit 1
            fi
          else
            echo "::error::Missing Windows updater bundle (.nsis.zip or -setup.exe)"
            exit 1
          fi

          echo "=== Collected artifacts ==="
          ls -la artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x86_64
          path: artifacts/*

  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: ls -laR artifacts/

      - name: Generate latest.json manifest
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://static.carminecapital.com/carmine-desktop"

          # Read signatures from .sig files
          read_sig() {
            local sig_file="$1"
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Windows: .nsis.zip + .sig OR setup.exe + .sig
          WIN_BUNDLE=$(find artifacts -name '*.nsis.zip' ! -name '*.sig' | head -1)
          if [ -z "$WIN_BUNDLE" ]; then
            WIN_BUNDLE=$(find artifacts -name '*-setup.exe' | head -1)
          fi
          WIN_SIG=$(read_sig "${WIN_BUNDLE}.sig" 2>/dev/null || echo "")
          WIN_FILENAME=$(basename "$WIN_BUNDLE" 2>/dev/null || echo "")

          if [ -z "$WIN_SIG" ]; then
            echo "::error::Missing Windows updater signature in latest.json generation"
            exit 1
          fi
          if [ -z "$WIN_FILENAME" ]; then
            echo "::error::Missing Windows updater filename in latest.json generation"
            exit 1
          fi

          # Build latest.json for Tauri updater
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release v${VERSION}" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "${BASE_URL}/${WIN_FILENAME}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $win_sig,
                  url: $win_url
                }
              }
            }' > artifacts/latest.json

          echo "=== latest.json ==="
          cat artifacts/latest.json

      - name: Upload to private server
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ env.UPLOAD_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload all artifacts + manifest via rsync
          rsync -avz --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            artifacts/ \
            "carminec@${{ env.UPLOAD_HOST }}:${{ env.UPLOAD_PATH }}/"

          echo "=== Upload complete ==="
          echo "Artifacts available at: https://${{ env.UPLOAD_HOST }}/carmine-desktop/"
          echo "Updater manifest: https://${{ env.UPLOAD_HOST }}/carmine-desktop/latest.json"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
