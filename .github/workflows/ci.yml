name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: brew install macfuse

      - name: Install WinFsp SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install winfsp -y --params '/Developer'
          echo "WINFSP_INSTALL_DIR=C:\Program Files (x86)\WinFsp" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core)
        run: cargo clippy --all-targets

      - name: Clippy (desktop)
        run: cargo clippy --all-targets --features desktop

      - name: Build
        run: cargo build --all-targets

      - name: Build VFS crate (Windows WinFsp)
        if: runner.os == 'Windows'
        run: cargo build -p cloudmount-vfs --all-targets

      - name: Test
        run: cargo test --all-targets
