name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # The frontend is required for `cargo clippy --features desktop` and
      # `cargo tauri build` (release installer workflow). Kept in sync across
      # every workflow that compiles the desktop binary.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crates/carminedesktop-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/carminedesktop-app/frontend

      - name: Build frontend
        run: npm run build
        working-directory: crates/carminedesktop-app/frontend

      - name: Install WinFsp SDK and LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install winfsp llvm -y --params '/Developer'
          echo "WINFSP_INSTALL_DIR=C:\Program Files (x86)\WinFsp" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Create winfsp.msi placeholder for Tauri build (Windows)
        if: runner.os == 'Windows'
        run: New-Item -ItemType File -Path crates/carminedesktop-app/resources/winfsp.msi -Force

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core)
        run: cargo clippy --all-targets

      - name: Clippy (desktop)
        run: cargo clippy --all-targets --features desktop

      - name: Build
        run: cargo build --all-targets

      - name: Build VFS crate (Windows WinFsp)
        run: cargo build -p carminedesktop-vfs --all-targets

      - name: Test
        run: cargo test --all-targets
