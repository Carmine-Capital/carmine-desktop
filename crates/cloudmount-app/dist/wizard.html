<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudMount Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 480px; margin: auto; padding: 2rem; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    button { background: #0078d4; color: white; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #106ebe; }
    .step { display: none; }
    .step.active { display: block; }
    .mount-list { text-align: left; margin: 1rem 0; }
    .mount-item { padding: 0.5rem; background: white; border-radius: 4px; margin-bottom: 0.5rem; }
    .spinner { display: inline-block; width: 2rem; height: 2rem; border: 3px solid #ddd; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .url-box { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; }
    .url-input { flex: 1; padding: 0.5rem; font-size: 0.8rem; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; background: #fff; color: #333; min-width: 0; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .error-msg { color: #c00; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="step-welcome" class="step active">
      <h1 id="app-title">CloudMount</h1>
      <p>Mount your OneDrive and SharePoint files as local folders.</p>
      <div id="preconfigured-mounts" class="mount-list" style="display:none"></div>
      <button onclick="startSignIn()">Sign in with Microsoft</button>
    </div>
    <div id="step-signing-in" class="step">
      <div class="spinner"></div>
      <h1>Waiting for login&hellip;</h1>
      <p>A browser window should have opened. If not, copy the URL below and open it manually.</p>
      <div class="url-box">
        <input id="auth-url" class="url-input" type="text" readonly>
        <button id="copy-btn" onclick="copyAuthUrl()">Copy URL</button>
      </div>
      <div id="auth-error" class="error-msg" style="display:none"></div>
      <button class="btn-secondary" onclick="cancelSignIn()" style="margin-top:1rem">Cancel</button>
    </div>
    <div id="step-source" class="step">
      <h1>Select Source</h1>
      <p>What would you like to mount?</p>
      <button onclick="selectSource('drive')">OneDrive</button>
      <button onclick="selectSource('sharepoint')">SharePoint Site</button>
    </div>
    <div id="step-done" class="step">
      <h1>All Set</h1>
      <p>Your drives are mounted and ready to use.</p>
      <button onclick="window.__TAURI__.window.getCurrentWindow().close()">Close</button>
    </div>
  </div>
  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    let signingIn = false;
    let activeListeners = [];

    async function startSignIn() {
      if (signingIn) return;
      signingIn = true;
      document.getElementById('auth-error').style.display = 'none';
      showStep('step-signing-in');

      // Register event listeners before invoking so we don't miss events.
      activeListeners.push(await listen('auth-complete', async () => {
        if (!signingIn) return;
        signingIn = false;
        cleanupListeners();
        await onSignInComplete();
      }));
      activeListeners.push(await listen('auth-error', (event) => {
        if (!signingIn) return;
        signingIn = false;
        cleanupListeners();
        const errEl = document.getElementById('auth-error');
        errEl.textContent = 'Sign-in failed: ' + (event.payload || 'unknown error');
        errEl.style.display = 'block';
      }));

      try {
        const authUrl = await invoke('start_sign_in');
        document.getElementById('auth-url').value = authUrl;
      } catch (e) {
        signingIn = false;
        cleanupListeners();
        console.error('start_sign_in failed:', e);
        showStep('step-welcome');
      }
    }

    function cancelSignIn() {
      signingIn = false;
      cleanupListeners();
      showStep('step-welcome');
    }

    async function copyAuthUrl() {
      const url = document.getElementById('auth-url').value;
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy URL'; }, 2000);
      } catch (e) {
        console.error('clipboard write failed:', e);
      }
    }

    async function onSignInComplete() {
      const mounts = await invoke('list_mounts');
      if (mounts.length > 0) {
        showStep('step-done');
      } else {
        showStep('step-source');
      }
    }

    function cleanupListeners() {
      activeListeners.forEach(fn => { try { fn(); } catch (_) {} });
      activeListeners = [];
    }

    function selectSource(type) {
      showStep('step-done');
    }

    function showStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function init() {
      try {
        const settings = await invoke('get_settings');
        document.getElementById('app-title').textContent = settings.app_name;
        document.title = settings.app_name + ' Setup';

        const mounts = await invoke('list_mounts');
        if (mounts.length > 0) {
          const list = document.getElementById('preconfigured-mounts');
          list.style.display = 'block';
          mounts.forEach(m => {
            const div = document.createElement('div');
            div.className = 'mount-item';
            div.textContent = m.name + ' \u2192 ' + m.mount_point;
            list.appendChild(div);
          });
        }
      } catch (e) { console.error(e); }
    }
    init();
  </script>
</body>
</html>
