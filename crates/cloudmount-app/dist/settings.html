<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'">
  <title>CloudMount Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tabs" role="tablist">
    <div class="tab active" data-panel="general" role="tab" tabindex="0" aria-selected="true" aria-controls="general" id="tab-general">General</div>
    <div class="tab" data-panel="mounts" role="tab" tabindex="-1" aria-selected="false" aria-controls="mounts" id="tab-mounts">Mounts</div>
    <div class="tab" data-panel="account" role="tab" tabindex="-1" aria-selected="false" aria-controls="account" id="tab-account">Account</div>
    <div class="tab" data-panel="advanced" role="tab" tabindex="-1" aria-selected="false" aria-controls="advanced" id="tab-advanced">Advanced</div>
  </div>

  <div id="unsaved-badge" class="unsaved-badge" style="display:none" aria-live="polite">Unsaved changes</div>

  <div id="general" class="panel active" role="tabpanel" aria-labelledby="tab-general">
    <div class="field">
      <label><input type="checkbox" id="auto-start"> Start on login</label>
    </div>
    <div class="field">
      <label><input type="checkbox" id="notifications"> Notifications</label>
    </div>
    <div class="field">
      <label for="sync-interval">Sync interval</label>
      <select id="sync-interval">
        <option value="30">30 seconds</option>
        <option value="60">1 minute</option>
        <option value="300">5 minutes</option>
        <option value="900">15 minutes</option>
      </select>
    </div>
    <div class="actions">
      <button id="btn-save-general">Save</button>
    </div>
  </div>

  <div id="mounts" class="panel" role="tabpanel" aria-labelledby="tab-mounts">
    <ul class="mount-list settings-mounts" id="mount-list"></ul>
    <div class="actions">
      <button id="btn-add-mount">Add Mount</button>
    </div>
  </div>

  <div id="account" class="panel" role="tabpanel" aria-labelledby="tab-account">
    <p id="account-email">Not signed in</p>
    <div class="actions">
      <button id="btn-sign-out" class="btn-danger">Sign Out</button>
    </div>
  </div>

  <div id="advanced" class="panel" role="tabpanel" aria-labelledby="tab-advanced">
    <div class="field">
      <label for="cache-dir">Cache directory</label>
      <input type="text" id="cache-dir" placeholder="Default">
    </div>
    <div class="field">
      <label for="cache-max-size">Maximum cache size</label>
      <input type="text" id="cache-max-size" placeholder="5GB">
    </div>
    <div class="field">
      <label for="metadata-ttl">Metadata TTL (seconds)</label>
      <input type="number" id="metadata-ttl" placeholder="60">
    </div>
    <div class="field">
      <label for="log-level">Log level</label>
      <select id="log-level">
        <option value="error">Error</option>
        <option value="warn">Warning</option>
        <option value="info">Info</option>
        <option value="debug">Debug</option>
        <option value="trace">Trace</option>
      </select>
    </div>
    <div class="actions">
      <button id="btn-save-advanced">Save</button>
      <button id="btn-clear-cache" class="btn-danger">Clear Cache</button>
    </div>
  </div>

  <div id="status-bar" role="status" aria-live="polite"></div>
  <script src="ui.js"></script>
  <script src="settings.js"></script>
</body>
</html>
